services:
  benchmark:
    image: nvidia/cuda:12.4.1-cudnn-runtime-ubuntu22.04
    container_name: vllm-benchmark-nobuild
    working_dir: /workspace
    environment:
      HF_HOME: /workspace/.cache/huggingface
      TRANSFORMERS_CACHE: /workspace/.cache/huggingface
      TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu124}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ../:/workspace
      - hf-cache:/workspace/.cache/huggingface
    gpus: all
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      set -euo pipefail;
      apt-get update;
      apt-get install -y --no-install-recommends python3 python3-pip python3-venv git;
      ln -sf /usr/bin/python3 /usr/bin/python;
      python -m pip install --upgrade pip;
      python -m pip install --index-url "$$TORCH_INDEX_URL" torch torchvision torchaudio;
      python -m pip install -r requirements.txt;
      python validate_setup.py;
      python run_benchmark.py --seed 42 --max-new-tokens 100 --output vllm_vs_hf_results.csv --quiet

volumes:
  hf-cache:
